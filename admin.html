<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Painel Admin — Parada da Pizza</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #CC1B1B;
      --red-d: #A51515;
      --red-soft: #FFF2F2;
      --yellow: #F5C800;
      --yellow-soft: #FFFBE6;
      --green-ok: #15803D;
      --green-bg: #DCFCE7;
      --dark: #111111;
      --mid: #555555;
      --light: #888888;
      --border: #E5E5E5;
      --bg: #F6F6F6;
      --white: #FFFFFF;
      --card-r: 14px;
      --shadow-sm: 0 2px 8px rgba(0,0,0,.08);
      --shadow-md: 0 6px 24px rgba(0,0,0,.12);
      --font-head: 'Barlow Condensed', sans-serif;
      --font-body: 'Barlow', sans-serif;
      --tr: .2s ease;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--dark);
      min-height: 100vh;
    }

    .admin-header {
      background: var(--dark);
      padding: 0 20px;
      min-height: 58px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,.3);
    }

    .admin-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
    }

    .admin-brand span { font-size: 26px; }

    .admin-brand strong {
      font-family: var(--font-head);
      font-size: 20px;
      font-weight: 900;
      color: var(--yellow);
      text-transform: uppercase;
    }

    .admin-brand small {
      display: block;
      font-size: 11px;
      color: rgba(255,255,255,.6);
    }

    #loginScreen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 58px);
      padding: 20px;
    }

    .login-card {
      background: var(--white);
      border-radius: 18px;
      padding: 40px 32px;
      box-shadow: var(--shadow-md);
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    .login-card .login-icon { font-size: 48px; margin-bottom: 12px; }

    .login-card h2 {
      font-family: var(--font-head);
      font-size: 26px;
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .login-card p {
      font-size: 13px;
      color: var(--light);
      margin-bottom: 24px;
    }

    .login-card input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      font-family: var(--font-body);
      margin-bottom: 12px;
      text-align: center;
      letter-spacing: 3px;
    }

    .login-card input:focus {
      outline: none;
      border-color: var(--red);
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--red);
      color: var(--white);
      border: none;
      border-radius: 10px;
      font-family: var(--font-head);
      font-size: 17px;
      font-weight: 800;
      text-transform: uppercase;
      cursor: pointer;
      transition: var(--tr);
    }

    .btn-login:hover { background: var(--red-d); }

    .erro-senha {
      margin-top: 10px;
      font-size: 13px;
      color: var(--red);
      font-weight: 600;
      min-height: 18px;
    }

    #painelScreen { display: none; }

    .painel-wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px 16px 60px;
    }

    .painel-topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .painel-topbar h2 {
      font-family: var(--font-head);
      font-size: 28px;
      font-weight: 900;
      text-transform: uppercase;
      flex: 1;
    }

    .status-msg {
      font-size: 12px;
      color: var(--light);
      width: 100%;
      order: 10;
    }

    .btn-atualizar {
      padding: 10px 20px;
      background: var(--dark);
      color: var(--white);
      border: none;
      border-radius: 10px;
      font-family: var(--font-head);
      font-size: 16px;
      font-weight: 800;
      text-transform: uppercase;
      cursor: pointer;
      transition: var(--tr);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-atualizar:hover { background: #333; }
    .btn-atualizar:disabled { opacity: .5; cursor: not-allowed; }

    .btn-fullscreen {
      background: var(--red);
    }

    .btn-fullscreen:hover {
      background: var(--red-d);
    }

    .filtros {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .filtro-btn {
      padding: 7px 16px;
      border: 2px solid var(--border);
      border-radius: 999px;
      background: var(--white);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: var(--tr);
    }

    .filtro-btn:hover { border-color: var(--red); color: var(--red); }
    .filtro-btn.active { background: var(--red); border-color: var(--red); color: var(--white); }

    .painel-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .painel-empty,
    .painel-loading {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px 20px;
      color: var(--light);
    }

    .painel-empty big { font-size: 48px; display: block; margin-bottom: 12px; }

    .painel-error {
      grid-column: 1/-1;
      text-align: center;
      padding: 40px 20px;
      color: var(--red);
      background: var(--red-soft);
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
    }

    .pedido-card {
      background: var(--white);
      border-radius: var(--card-r);
      padding: 16px;
      box-shadow: var(--shadow-sm);
      border-left: 4px solid var(--red);
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: var(--tr);
    }

    .pedido-impresso {
      border-left-color: var(--green-ok);
      opacity: .8;
    }

    .pedido-header {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }

    .pedido-num {
      font-family: var(--font-head);
      font-size: 20px;
      font-weight: 900;
      color: var(--red);
    }

    .pedido-time,
    .pedido-client-tel,
    .pedido-addr,
    .pedido-pay {
      font-size: 12px;
      color: var(--mid);
    }

    .pedido-client-name {
      font-weight: 700;
      font-size: 15px;
    }

    .pedido-badge {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }

    .badge-retirada { background: var(--yellow-soft); color: #7A4F00; }
    .badge-entrega  { background: #E0F2FE; color: #0369A1; }
    .status-novo    { background: #FEF3C7; color: #92400E; }
    .status-impresso{ background: var(--green-bg); color: var(--green-ok); }

    .pedido-items {
      font-family: inherit;
      white-space: pre-wrap;
      font-size: 13px;
      line-height: 1.7;
    }

    .pedido-total-line {
      display: flex;
      justify-content: space-between;
      font-weight: 700;
      padding-top: 8px;
      border-top: 1px dashed var(--border);
    }

    .pedido-total-line span:last-child {
      font-family: var(--font-head);
      font-size: 20px;
      color: var(--red);
    }

    .pedido-actions {
      display: flex;
      gap: 8px;
    }

    .btn-imprimir,
    .btn-marcar,
    .btn-remover-pedido {
      padding: 9px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: var(--tr);
    }

    .btn-imprimir {
      flex: 1;
      background: var(--dark);
      color: var(--white);
      border: none;
    }

    .btn-imprimir:hover { background: #333; }

    .btn-marcar {
      flex: 1;
      background: var(--green-bg);
      color: var(--green-ok);
      border: 2px solid var(--green-ok);
    }

    .btn-marcar:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    .btn-remover-pedido {
      border: 2px solid var(--border);
      background: transparent;
      color: var(--mid);
    }

    .btn-remover-pedido:hover {
      border-color: var(--red);
      color: var(--red);
    }

    #printArea { display: none; }

    @media print {
      body > *:not(#printArea) { display: none !important; }

      #printArea {
        display: block !important;
        width: 80mm !important;
        max-width: 80mm !important;
        padding: 8px !important;
        font-family: "Courier New", monospace !important;
        font-size: 18px !important;
        line-height: 1.55 !important;
        font-weight: 700 !important;
        color: #000 !important;
        background: #fff !important;
      }

      .prt-logo {
        text-align: center;
        font-size: 22px !important;
        font-weight: 900 !important;
        padding-bottom: 6px;
      }

      .prt-row {
        display: flex;
        justify-content: space-between;
        gap: 4px;
        font-size: 18px !important;
        margin-bottom: 5px !important;
      }

      .prt-row .r {
        text-align: right;
        white-space: nowrap;
      }

      .prt-section-title {
        font-size: 18px !important;
        font-weight: 900 !important;
        margin: 6px 0 4px;
      }

      .prt-total {
        font-size: 22px !important;
        font-weight: 900 !important;
        margin-top: 6px;
        padding-top: 6px;
        border-top: 1px solid #000;
      }

      .prt-rodape {
        text-align: center;
        font-size: 15px !important;
        line-height: 1.4 !important;
        margin-top: 10px;
        padding-top: 6px;
        border-top: 1px dashed #000;
      }

      .prt-sep {
        border: none;
        border-top: 1px dashed #000;
        margin: 8px 0;
      }
    }

    @media (max-width: 640px) {
      .painel-topbar { flex-direction: column; align-items: flex-start; }
      .pedido-actions { flex-wrap: wrap; }
      .btn-imprimir, .btn-marcar { flex: 1 1 45%; }
    }
  </style>
</head>

<body>

<header class="admin-header">
  <div class="admin-brand">
    <span>🍕</span>
    <div>
      <strong>Parada da Pizza</strong>
      <small>Painel Admin</small>
    </div>
  </div>
</header>

<div id="loginScreen">
  <div class="login-card">
    <div class="login-icon">🔐</div>
    <h2>Acesso Restrito</h2>
    <p>Digite a senha para acessar o painel de pedidos</p>
    <input type="password" id="inputSenha" placeholder="••••••••••"/>
    <button class="btn-login" onclick="verificarSenha()">Entrar</button>
    <div class="erro-senha" id="erroSenha"></div>
  </div>
</div>

<div id="painelScreen">
  <div class="painel-wrap">

    <div class="painel-topbar">
      <h2>📋 Pedidos</h2>

      <button class="btn-atualizar" id="btnAtualizar" onclick="carregarPedidos()">
        🔄 Atualizar
      </button>

      <button class="btn-atualizar btn-fullscreen" id="btnTelaCheia" onclick="ativarTelaCheia()">
        📺 Tela Cheia
      </button>

      <div class="status-msg" id="statusMsg"></div>
    </div>

    <div class="filtros">
      <button class="filtro-btn active" data-filtro="todos" onclick="filtrarPedidos('todos')">
        Todos
      </button>
      <button class="filtro-btn" data-filtro="novo" onclick="filtrarPedidos('novo')">
        🆕 Novos
      </button>
      <button class="filtro-btn" data-filtro="impresso" onclick="filtrarPedidos('impresso')">
        ✅ Impressos
      </button>
    </div>

    <div class="painel-list" id="painelList">
      <div class="painel-loading">Aguardando autenticação...</div>
    </div>

  </div>
</div>

<div id="printArea"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/admin.js"></script>

</body>
</html>
