<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Painel Admin — Parada da Pizza</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/admin.css">
  <link rel="stylesheet" href="css/print.css">
</head>

<body>

<header class="admin-header">
  <div class="admin-brand">
    <span>🍕</span>
    <div>
      <strong>Parada da Pizza</strong>
      <small>Painel Admin</small>
    </div>
  </div>
</header>

<div id="loginScreen">
  <div class="login-card">
    <div class="login-icon">🔐</div>
    <h2>Acesso Restrito</h2>
    <p>Digite a senha para acessar o painel de pedidos</p>
    <input type="password" id="inputSenha" placeholder="••••••••••"/>
    <button class="btn-login" onclick="verificarSenha()">Entrar</button>
    <div class="erro-senha" id="erroSenha"></div>
  </div>
</div>

<div id="painelScreen">
  <div class="painel-wrap">

    <div class="painel-topbar">
      <h2>📋 Pedidos</h2>

      <button class="btn-atualizar" id="btnAtualizar" onclick="carregarPedidos()">
        🔄 Atualizar
      </button>

      <button class="btn-atualizar btn-fullscreen" id="btnTelaCheia" onclick="ativarTelaCheia()">
        📺 Tela Cheia
      </button>

      <div class="status-msg" id="statusMsg"></div>
    </div>

    <div class="filtros">
      <button class="filtro-btn active" data-filtro="todos" onclick="filtrarPedidos('todos')">
        Todos
      </button>
      <button class="filtro-btn" data-filtro="novo" onclick="filtrarPedidos('novo')">
        🆕 Novos
      </button>
      <button class="filtro-btn" data-filtro="impresso" onclick="filtrarPedidos('impresso')">
        ✅ Impressos
      </button>
    </div>

    <div class="painel-list" id="painelList">
      <div class="painel-loading">Aguardando autenticação...</div>
    </div>

  </div>
</div>

<div id="printArea"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/admin.js"></script>

</body>
</html>
